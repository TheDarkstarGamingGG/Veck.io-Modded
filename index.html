<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VECK_OS_FINAL_V11</title>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #111; overflow: hidden; font-family: monospace; }
        #browser-bar { height: 40px; background: #222; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #444; color: #0f0; }
        #game-frame { width: 100vw; height: calc(100vh - 40px); border: none; }
        .status-dot { height: 10px; width: 10px; background: #0f0; border-radius: 50%; margin-right: 10px; box-shadow: 0 0 5px #0f0; }
    </style>
</head>
<body>
    <div id="browser-bar">
        <div class="status-dot"></div>
        <span>SYSTEM: INJECTOR_ACTIVE | TARGET: VECK.IO</span>
    </div>

    <iframe id="game-frame" src="https://veck.io/"></iframe>

    <script>
        // 3. Register the Service Worker (The Engine)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
                console.log('HIJACK ENGINE: ONLINE');
                // If it's the first time, we need one refresh to start the interception
                if (!navigator.serviceWorker.controller) {
                    setTimeout(() => { window.location.reload(); }, 1000);
                }
            })
            .catch(err => console.error('ENGINE CRASH:', err));
        }

        // 4. THE COMMAND CENTER
        // Run this in the Eruda Console to activate cheats after the game loads
        window.activateGodMode = function() {
            try {
                const win = document.getElementById('game-frame').contentWindow;
                const engine = win.unityInstance || win.gameInstance;
                
                if (engine) {
                    engine.SendMessage('Player', 'SetGravity', 0);
                    engine.SendMessage('Player', 'SetCollision', false);
                    alert("NOCLIP & FLY ENABLED");
                } else {
                    alert("Game not ready yet. Wait for the 100% bar!");
                }
            } catch (e) {
                console.log("CORS Wall hit. Trying Service Worker override...");
            }
        };
    </script>
</body>
</html>
