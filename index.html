<!DOCTYPE html>
<html>
<head>
    <title>VECK_BRIDGE_V10</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        #overlay { position: fixed; top: 10px; left: 10px; color: #0f0; font-family: monospace; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>
    <div id="overlay">BRIDGE STATUS: ACTIVE</div>
    
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <iframe id="game-window" src="https://veck.io/"></iframe>

    <script>
        const frame = document.getElementById('game-window');

        // THE SMUGGLER: Every 3 seconds, we try to "Infect" the iframe
        setInterval(() => {
            try {
                // If the browser lets us in, we inject the gear directly
                const win = frame.contentWindow;
                if (win.document) {
                    const script = win.document.createElement('script');
                    script.src = "https://cdn.jsdelivr.net/npm/eruda";
                    win.document.head.appendChild(script);
                    
                    const init = win.document.createElement('script');
                    init.innerHTML = "eruda.init(); console.log('GEAR SMUGGLED SUCCESSFULLY');";
                    win.document.head.appendChild(init);
                    
                    document.getElementById('overlay').innerHTML = "BRIDGE STATUS: INJECTED";
                }
            } catch (e) {
                // If we get a SecurityError, we use the 'Visual Hack' instead
                document.getElementById('overlay').innerHTML = "BRIDGE STATUS: SECURED (X-RAY READY)";
            }
        }, 3000);
    </script>
</body>
</html>
