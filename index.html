<!DOCTYPE html>
<html>
<head>
    <title>Veck.io System Bypass</title>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
</head>
<body>
    <div id="game-root"></div>

    <script>
        // THE INJECTOR: This function mimics what Tampermonkey does
        async function injectAndLoad() {
            const proxy = "https://api.allorigins.win/get?url=";
            const target = encodeURIComponent("https://veck.io/");

            const response = await fetch(proxy + target);
            const data = await response.json();
            let html = data.contents;

            // 1. FIX THE PATHS: Ensure the game can still find its 3D models
            html = html.replace('<head>', `<head><base href="https://veck.io/">`);

            // 2. THE TAMPERMONKEY REPLACEMENT: Inject our "Hack" script directly into the HTML
            const hackerScript = `
                <script>
                    console.log("HACKER SCRIPT ACTIVE");
                    
                    // This function 'hooks' into the game engine
                    window.activateCheats = function() {
                        const engine = window.unityInstance || window.gameInstance;
                        if (engine) {
                            // FLY: Remove gravity
                            engine.SendMessage('Player', 'SetGravity', 0);
                            // NOCLIP: Disable the physics collider
                            engine.SendMessage('Player', 'SetCollision', false);
                            // INVISIBILITY: Disable the Renderer
                            engine.SendMessage('Player', 'SetVisible', false);
                            alert("Cheats Injected!");
                        } else {
                            setTimeout(window.activateCheats, 2000);
                        }
                    };
                    window.activateCheats();
                <\/script>
            `;

            html = html.replace('</body>', hackerScript + '</body>');

            // 3. EXECUTE: Turn the modded HTML into a "local" page
            const blob = new Blob([html], { type: 'text/html' });
            window.location.href = URL.createObjectURL(blob);
        }

        injectAndLoad();
    </script>
</body>
</html>
