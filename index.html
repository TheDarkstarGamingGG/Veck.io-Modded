<!DOCTYPE html>
<html>
<head>
    <title>Veck.io Overlay Environment</title>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #proxy-frame { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="container"></div>

    <script>
        // 2. The Proxy Logic
        const proxy = "https://cors-anywhere.herokuapp.com/";
        const target = "https://veck.io/";

        fetch(proxy + target)
            .then(r => r.text())
            .then(html => {
                // 3. Rewrite the internal links so the game can find its files
                let moddedHtml = html.replace('<head>', `<head><base href="${target}">`);
                
                // 4. Create a "fake" document inside our page
                const blob = new Blob([moddedHtml], { type: 'text/html' });
                const blobUrl = URL.createObjectURL(blob);
                
                const iframe = document.createElement('iframe');
                iframe.src = blobUrl;
                iframe.id = "proxy-frame";
                iframe.style.width = "100%";
                iframe.style.height = "100%";
                document.getElementById('container').appendChild(iframe);

                console.log("GAME INJECTED. OPEN ERUDA TO START MODDING.");
            })
            .catch(err => {
                document.body.innerHTML = "<h2 style='color:red; text-align:center;'>PROXY ERROR: Did you go to cors-anywhere.herokuapp.com/corsdemo and click the button?</h2>";
            });
    </script>
</body>
</html>
